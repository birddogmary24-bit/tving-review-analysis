name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Next.js CI
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      - name: Run unit tests
        run: npm test
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 7

      - name: Run scripts validation
        run: |
          echo "Validating TypeScript scripts..."
          npx tsc --noEmit scripts/*.ts || true
        continue-on-error: true

  # 성공 알림
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: success()
    
    steps:
      - name: Success notification
        run: echo "✅ All CI checks passed for tving-review-analysis!"
