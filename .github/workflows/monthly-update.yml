name: Monthly Auto Update
on:
  schedule:
    # Runs at 3 AM KST (6 PM UTC previous day) on the 2nd of every month
    # This is off-peak hours for cost optimization
    - cron: '0 18 1 * *'  # 18:00 UTC on 1st = 3:00 AM KST on 2nd
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Data Update
        env:
          UPDATE_PASSWORD: ${{ secrets.UPDATE_PASSWORD }}
        run: |
          curl -f "https://tving-analysis-520722818842.asia-northeast3.run.app/api/batch?password=${UPDATE_PASSWORD}" || exit 1
          
      - name: Wait for processing
        run: sleep 30
        
      - name: Generate Monthly Insights
        env:
          UPDATE_PASSWORD: ${{ secrets.UPDATE_PASSWORD }}
        run: |
          CURRENT_MONTH=$(date -u +"%Y-%m")
          curl -f "https://tving-analysis-520722818842.asia-northeast3.run.app/api/insights/generate?month=${CURRENT_MONTH}&password=${UPDATE_PASSWORD}" || exit 1
