name: Monthly Auto Update
on:
  schedule:
    # Runs at 3 AM KST (6 PM UTC previous day) on the 2nd of every month
    # This is off-peak hours for cost optimization
    - cron: '0 18 1 * *'  # 18:00 UTC on 1st = 3:00 AM KST on 2nd
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tving, netflix, disneyplus, wavve, coupangplay, watcha]
    steps:
      - name: Trigger Data Update for ${{ matrix.app }}
        env:
          UPDATE_PASSWORD: ${{ secrets.UPDATE_PASSWORD }}
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
        run: |
          echo "Starting batch update for ${{ matrix.app }}..."
          curl -f -X POST "${SERVICE_URL}/api/${{ matrix.app }}/batch" \
            --connect-timeout 30 \
            --max-time 300 \
            -H "Content-Type: application/json" \
            -d "{\"password\":\"${UPDATE_PASSWORD}\"}" || exit 1
          echo "Batch update completed for ${{ matrix.app }}"
